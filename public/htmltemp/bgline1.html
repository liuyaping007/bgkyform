<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>pink lasers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!--<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/5.0.0/normalize.min.css">-->


    <style>
        html,
        body,
        canvas {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            overflow: hidden;
            content-zooming: none;
        }
    </style>


</head>

<body style="overflow:hidden">


    <canvas></canvas>



    <script>

        function getQueryParam(param) {
            // 获取当前页面的URL
            var url = window.location.search;
            // 使用URLSearchParams解析查询字符串
            var params = new URLSearchParams(url);
            // 返回指定参数的值
            return params.get(param);
        }

        var hue1 = getQueryParam('hue1') || 261;
        var hue2 = getQueryParam('hue2') || 340;

        let af;
        const numLasers = 250;
        const tail = 200;
        const canvas = document.querySelector("canvas");
        const ctx = canvas.getContext("2d");
        // 设置背景透明


        const createLasers = n => {
            const lasers = [];
            for (let i = 0; i < n; ++i) {
                lasers.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    s: Math.random() * 2 + 1
                });
            }
            return lasers;
        };
        const renderLaser = l => {
            const grad = ctx.createLinearGradient(l.x, l.y, l.x, l.y + tail);
            const a = 1 - (canvas.height - l.y) / canvas.height * 0.8;
            grad.addColorStop(0, `hsla(${parseInt(hue2)},100%,100%,${a})`);
            grad.addColorStop(1, "hsla(" + parseInt(hue2) + ",100%,50%,0)");
            ctx.strokeStyle = grad;
            ctx.beginPath();
            ctx.moveTo(l.x, l.y);
            ctx.lineTo(l.x, l.y + tail);
            ctx.stroke();
        };
        const updateLaser = l => {
            l.y -= l.s;
            if (l.y < -tail) {
                l.y = canvas.height;
            }
        };
        const render = lasers => {
            // ctx.fillStyle = "hsl(261,43%,7%)";
            //   ctx.fillStyle = "rgba(0,0,0,0)";
            ctx.fillStyle = "hsl(" + parseInt(hue1) + ",63%,10%)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let l of lasers) {
                renderLaser(l);
                updateLaser(l);
            }
            af = requestAnimationFrame(() => render(lasers));
        };
        const init = () => {
            cancelAnimationFrame(af);
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render(createLasers(numLasers));
        };
        window.onresize = init;
        init();
    </script>




</body>

</html>
